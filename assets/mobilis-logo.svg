<svg width="158" height="54" viewBox="0 0 158 54" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Mobilis logo</title>
  <rect width="158" height="54" fill="transparent"/>
  <defs>
    <linearGradient id="mobilisGreen" x1="18" y1="16" x2="118" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4FF37"/>
      <stop offset="0.45" stop-color="#52D63A"/>
      <stop offset="1" stop-color="#149F27"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="158" height="54" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="1.4"/>
      <feGaussianBlur stdDeviation="0.7"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.03 0 0 0 0 0.23 0 0 0 0 0.04 0 0 0 0.65 0"/>
      <feBlend in2="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <text x="17" y="12" fill="#D61515" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700">موبيليس</text>
    <text x="15" y="41" fill="url(#mobilisGreen)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="34" font-weight="900" letter-spacing="-1.7">mobilis</text>
  </g>
</svg>
